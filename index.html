<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WRS Data</title>

  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CNSP7M0GFT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CNSP7M0GFT');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
    }

header {
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 16px 48px; /* increased from 32px */
}

.header-container {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  /* removed max-width and margin */
}

    .logo-left  { display: flex; justify-content: flex-start; }
    .logo-right { display: flex; justify-content: flex-end; text-decoration: none; align-items: center;}

    header a img {
        height: 50px;
        width: auto;
        display: block;
    }

    .header-title {
        text-align: center;
    }

    .header-title h1 {
        text-transform: uppercase;
        margin: 0 0 17.5px;
        font-family: Fjalla One, sans-serif;
        font-style: normal;
        font-weight: 400;
        line-height: 1.2;
        overflow-wrap: break-word;
        word-wrap: break-word;
        color: #111;
        display: block;
        font-size: 2.0rem;
        margin-block-start: 0.83em;
        margin-block-end: 0.83em;
        font-weight: bold;
        unicode-bidi: isolate;
    }

    .header-title p {
        font-size: 0.75rem;
        color: #888;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: 2px;
        text-align: center;
    }

    .archie-logo {
        height: 80px; /* increase this to make it bigger */
        align-items: center;
        margin: auto;
        /* margin-left: 20px; */
    }

    .presented-by {
        /* text-align: left; */
        font-size: 0.7rem;
        color: #888;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 4px;
        text-decoration: none;
        align-items: center;
    }

    .a_config {
        text-decoration: none;
        align-items: center;
        text-align: center;
        
    }

    @media (max-width: 600px) {
        header {
            padding: 10px 16px;
        }

        .header-title h1 {
            font-size: 1rem;
            word-break: break-word;
            max-width: 90px;
        }

        .header-title p {
            font-size: 0.65rem;
        }

        header a img,
        .archie-logo {
            height: 30px;
        }

        .archie-logo {
            height: 50px;
        }

        .presented-by {
            font-size: 0.5rem;
        }
    }

  </style>
</head>
<body>

  <header>
    <div class="header-container">
        <div class="logo-left">
        <a href="https://weeklyraceseries.com/">
            <img src="wrs_logo.avif" alt="Weekly Race Series"/>
        </a>
        </div>
        <div class="header-title">
            <h1>Lifetime Race Results</h1>
            <!-- <p>Utah's Weekly Race Series</p> -->
        </div>
        <div class="logo-right">
            <div>
                <a class="a_config" href="https://www.archieraceteam.com/">
                    <p class="presented-by">Presented by:</p>   
                    <img src="archie_logo.svg" alt="Archie Race Team" class="archie-logo"/>
                </a>
            </div>
    </div>
    </div>
  </header>

</body>
</html>
