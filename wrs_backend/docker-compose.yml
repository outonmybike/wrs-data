version: "3.8"

services:
  db:
    image: postgres:17 # Use the official PostgreSQL image from Docker Hub
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin 
      POSTGRES_PASSWORD: admin 
      POSTGRES_DB: wrs_data
    ports:
      - "5432:5432" 
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: